<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1b2838"/>
      <stop offset="100%" stop-color="#171a21"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="600" height="56" fill="#171a21" rx="12"/>
  <rect x="0" y="28" width="600" height="28" fill="#171a21"/>
  <image x="20" y="6" width="38" height="38" xlink:href="steam-logo.png"/>
  <text x="70" y="32" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#66c0f4" letter-spacing="3">STEAM</text>
  <text x="580" y="34" font-family="Arial, sans-serif" font-size="10" fill="#8f98a0" text-anchor="end">store.steampowered.com</text>
  <rect x="30" y="75" width="340" height="40" rx="6" fill="#2a475e"/>
  <text x="50" y="100" font-family="Arial, sans-serif" font-size="13" fill="#c6d4df">Account</text>
  <text x="570" y="100" font-family="Arial, sans-serif" font-size="12" fill="#66c0f4" text-anchor="end">Redeem a Steam Wallet Code →</text>
  <rect x="30" y="130" width="540" height="80" rx="8" fill="#2a475e"/>
  <text x="50" y="160" font-family="Arial, sans-serif" font-size="12" fill="#c6d4df">Redeem Steam Wallet Code</text>
  <rect x="50" y="175" width="300" height="24" rx="4" fill="#1b2838" stroke="#66c0f4" stroke-width="1.5"/>
  <text x="60" y="192" font-family="monospace, monospace" font-size="11" fill="#66c0f4">STEAM-5USD-A1B2C3</text>
  <rect x="360" y="175" width="80" height="24" rx="4" fill="#66c0f4"/>
  <text x="400" y="192" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1b2838" text-anchor="middle">Redeem</text>
  <rect x="30" y="230" width="540" height="120" rx="8" fill="#2a475e" opacity="0.5"/>
  <text x="50" y="260" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#66c0f4">How to Redeem on Steam</text>
  <text x="50" y="285" font-family="Arial, sans-serif" font-size="11" fill="#8f98a0">1. Open Steam desktop app or visit store.steampowered.com</text>
  <text x="50" y="305" font-family="Arial, sans-serif" font-size="11" fill="#8f98a0">2. Go to your profile → Redeem a Steam Wallet Code</text>
  <text x="50" y="325" font-family="Arial, sans-serif" font-size="11" fill="#8f98a0">3. Enter your coupon code → Click Continue → Confirm</text>
  <circle cx="550" cy="345" r="15" fill="#66c0f4" opacity="0.15"/>
  <text x="550" y="350" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#66c0f4">✓</text>
