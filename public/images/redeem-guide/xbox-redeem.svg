<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#107c10"/>
      <stop offset="100%" stop-color="#0b5f0b"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="600" height="56" fill="#0b5f0b" rx="12"/>
  <rect x="0" y="28" width="600" height="28" fill="#0b5f0b"/>
  <image x="20" y="8" width="38" height="36" xlink:href="xbox-logo.png"/>
  <text x="70" y="32" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" letter-spacing="3">XBOX</text>
  <text x="580" y="34" font-family="Arial, sans-serif" font-size="10" fill="#9cd89c" text-anchor="end">redeem.microsoft.com</text>
  <rect x="30" y="70" width="540" height="60" rx="8" fill="#107c10"/>
  <text x="50" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Redeem your code</text>
  <text x="50" y="115" font-family="Arial, sans-serif" font-size="10" fill="#9cd89c">Enter the 25-character code you received</text>
  <rect x="30" y="145" width="540" height="80" rx="8" fill="#107c10" opacity="0.6"/>
  <text x="50" y="175" font-family="Arial, sans-serif" font-size="12" fill="#ffffff">Code</text>
  <rect x="50" y="185" width="360" height="28" rx="4" fill="#0b5f0b" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.3"/>
  <text x="60" y="204" font-family="monospace, monospace" font-size="11" fill="#ffffff" letter-spacing="2">XXXXX-XXXXX-XXXXX-XXXXX-XXXXX</text>
  <rect x="420" y="185" width="85" height="28" rx="4" fill="#ffffff"/>
  <text x="462" y="204" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#107c10" text-anchor="middle">Redeem</text>
  <rect x="30" y="245" width="540" height="110" rx="8" fill="#107c10" opacity="0.4"/>
  <text x="50" y="275" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">How to Redeem on Xbox</text>
  <text x="50" y="300" font-family="Arial, sans-serif" font-size="11" fill="#9cd89c">1. On Xbox: Press Xbox button → Store → Redeem</text>
  <text x="50" y="320" font-family="Arial, sans-serif" font-size="11" fill="#9cd89c">2. Or visit redeem.microsoft.com and sign in</text>
  <text x="50" y="340" font-family="Arial, sans-serif" font-size="11" fill="#9cd89c">3. Enter your 25-char code → The balance is added instantly</text>
  <circle cx="550" cy="360" r="15" fill="#ffffff" opacity="0.15"/>
  <text x="550" y="365" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#ffffff">✓</text>
</svg>
