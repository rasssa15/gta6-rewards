  <text x="50" y="295" font-family="Arial, sans-serif" font-size="11" fill="#888">1. Contact GTA 6 Rewards support with your coupon code</text>
  <text x="50" y="315" font-family="Arial, sans-serif" font-size="11" fill="#888">2. Provide your wallet address for verification</text>
  <text x="50" y="335" font-family="Arial, sans-serif" font-size="11" fill="#888">3. Pre-order code sent to your email for your chosen platform</text>
