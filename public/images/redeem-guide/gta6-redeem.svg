  <text x="580" y="34" font-family="Arial, sans-serif" font-size="10" fill="#555" text-anchor="end">rockstargames.com</text>
  <rect x="30" y="70" width="540" height="50" rx="8" fill="#1a0533" stroke="#ff0066" stroke-width="0.5" stroke-opacity="0.3"/>
