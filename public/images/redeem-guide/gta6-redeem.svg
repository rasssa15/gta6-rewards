  <text x="50" y="110" font-family="Arial, sans-serif" font-size="10" fill="#888">Your coupon code for pre-ordering Grand Theft Auto VI</text>
  <rect x="30" y="135" width="540" height="85" rx="8" fill="#1a0533" stroke="#00ccff" stroke-width="0.5" stroke-opacity="0.3"/>
