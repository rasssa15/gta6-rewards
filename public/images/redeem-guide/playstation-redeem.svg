<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#003791"/>
      <stop offset="100%" stop-color="#00205b"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="12" fill="url(#bg)"/>
  <rect x="0" y="0" width="600" height="56" fill="#00205b" rx="12"/>
  <rect x="0" y="28" width="600" height="28" fill="#00205b"/>
  <image x="20" y="8" width="100" height="36" xlink:href="ps5-logo.png"/>
  <text x="580" y="34" font-family="Arial, sans-serif" font-size="10" fill="#8f98a0" text-anchor="end">store.playstation.com</text>
  <rect x="30" y="75" width="340" height="40" rx="6" fill="#004c99"/>
  <text x="50" y="100" font-family="Arial, sans-serif" font-size="13" fill="#e6f0ff">Account</text>
  <text x="570" y="100" font-family="Arial, sans-serif" font-size="12" fill="#0070d1" text-anchor="end">Redeem Codes →</text>
  <rect x="30" y="130" width="540" height="80" rx="8" fill="#004c99"/>
  <text x="50" y="160" font-family="Arial, sans-serif" font-size="12" fill="#e6f0ff">Redeem Code</text>
  <rect x="50" y="175" width="300" height="24" rx="4" fill="#003791" stroke="#0070d1" stroke-width="1.5"/>
  <text x="60" y="192" font-family="monospace, monospace" font-size="11" fill="#66b3ff">PS5-50USD-XYZ789</text>
  <rect x="360" y="175" width="80" height="24" rx="4" fill="#0070d1"/>
  <text x="400" y="192" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Redeem</text>
  <rect x="30" y="230" width="540" height="120" rx="8" fill="#004c99" opacity="0.5"/>
  <text x="50" y="260" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#66b3ff">How to Redeem on PlayStation</text>
  <text x="50" y="285" font-family="Arial, sans-serif" font-size="11" fill="#8fc5ff">1. Go to Settings → Account Management → Account Information</text>
  <text x="50" y="305" font-family="Arial, sans-serif" font-size="11" fill="#8fc5ff">2. Select "Redeem Codes" from the menu</text>
  <text x="50" y="325" font-family="Arial, sans-serif" font-size="11" fill="#8fc5ff">3. Enter your 12-digit code → Click Redeem → Confirm</text>
  <circle cx="550" cy="345" r="15" fill="#0070d1" opacity="0.15"/>
  <text x="550" y="350" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#66b3ff">✓</text>
</svg>
