<svg xmlns="http://www.w3.org/2000/svg" width="400" height="280" viewBox="0 0 400 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="100%" stop-color="#0d0218"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0066"/>
      <stop offset="100%" stop-color="#00ccff"/>
    </linearGradient>
  </defs>
  <rect width="400" height="280" rx="16" fill="url(#bg)"/>
  <rect x="0" y="0" width="400" height="280" rx="16" fill="url(#accent)" opacity="0.08"/>
  <!-- Grid pattern -->
  <g opacity="0.15">
    <line x1="0" y1="40" x2="400" y2="40" stroke="#00ccff" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="400" y2="80" stroke="#00ccff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="400" y2="120" stroke="#00ccff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="400" y2="160" stroke="#00ccff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="400" y2="200" stroke="#00ccff" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="400" y2="240" stroke="#00ccff" stroke-width="0.5"/>
    <line x1="80" y1="0" x2="80" y2="280" stroke="#ff0066" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="280" stroke="#ff0066" stroke-width="0.5"/>
    <line x1="240" y1="0" x2="240" y2="280" stroke="#ff0066" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="280" stroke="#ff0066" stroke-width="0.5"/>
  </g>
  <!-- Sun -->
  <circle cx="300" cy="80" r="35" fill="url(#accent)" opacity="0.3"/>
  <circle cx="300" cy="80" r="25" fill="#ff0066" opacity="0.15"/>
  <!-- Buildings -->
  <g opacity="0.4" fill="#0d0218">
    <rect x="40" y="120" width="35" height="100" rx="2"/>
    <rect x="85" y="150" width="30" height="70" rx="2"/>
    <rect x="125" y="100" width="40" height="120" rx="2"/>
    <rect x="175" y="130" width="28" height="90" rx="2"/>
    <rect x="213" y="80" width="45" height="140" rx="2"/>
    <rect x="268" y="110" width="30" height="110" rx="2"/>
    <rect x="308" y="140" width="35" height="80" rx="2"/>
    <rect x="353" y="120" width="40" height="100" rx="2"/>
  </g>
  <!-- Window lights -->
  <g fill="#00ccff" opacity="0.3">
    <rect x="48" y="130" width="4" height="4" rx="1"/>
    <rect x="60" y="150" width="4" height="4" rx="1"/>
    <rect x="135" y="110" width="4" height="4" rx="1"/>
    <rect x="148" y="140" width="4" height="4" rx="1"/>
    <rect x="225" y="95" width="4" height="4" rx="1"/>
    <rect x="240" y="130" width="4" height="4" rx="1"/>
    <rect x="278" y="130" width="4" height="4" rx="1"/>
    <rect x="320" y="155" width="4" height="4" rx="1"/>
  </g>
  <!-- Mountain silhouette -->
  <path d="M0 220 L60 180 L100 200 L150 170 L200 195 L250 160 L310 185 L350 165 L400 190 L400 280 L0 280Z" fill="#0d0218" opacity="0.5"/>
  <!-- Palm tree -->
  <g transform="translate(60, 180)" opacity="0.5">
    <path d="M0 40 Q-5 20 -3 0" stroke="#0d0218" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-3 0 Q-20 -15 -25 -10" stroke="#0d0218" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M-3 0 Q5 -20 10 -15" stroke="#0d0218" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M-3 0 Q-10 -25 -15 -22" stroke="#0d0218" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M-3 0 Q-5 -18 -2 -18" stroke="#0d0218" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Stars -->
  <g fill="#fff" opacity="0.4">
    <circle cx="50" cy="30" r="1"/><circle cx="120" cy="20" r="1.5"/>
    <circle cx="180" cy="40" r="1"/><circle cx="240" cy="15" r="1"/>
    <circle cx="320" cy="35" r="1.5"/><circle cx="370" cy="25" r="1"/>
    <circle cx="90" cy="55" r="0.8"/><circle cx="200" cy="60" r="0.8"/>
    <circle cx="350" cy="50" r="1"/><circle cx="150" cy="70" r="0.8"/>
  </g>
  <!-- Ground -->
  <rect x="0" y="230" width="400" height="50" fill="#0d0218" opacity="0.6"/>
  <line x1="0" y1="248" x2="400" y2="248" stroke="#ff0066" stroke-width="1.5" stroke-dasharray="15,10" opacity="0.3"/>
  <!-- Icon overlay -->
  <g transform="translate(160, 140)">
    <rect x="0" y="0" width="80" height="60" rx="6" fill="#1a0533" stroke="#ff0066" stroke-width="1" opacity="0.9"/>
    <rect x="5" y="5" width="30" height="22" rx="3" fill="#00ccff" opacity="0.3"/>
    <rect x="40" y="5" width="35" height="22" rx="3" fill="#ff0066" opacity="0.2"/>
    <rect x="5" y="32" width="35" height="22" rx="3" fill="#ff0066" opacity="0.2"/>
    <rect x="40" y="32" width="30" height="22" rx="3" fill="#00ccff" opacity="0.3"/>
  </g>
  <!-- Text -->
  <text x="200" y="270" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" opacity="0.3" letter-spacing="2">100 WALLPAPERS</text>
</svg>