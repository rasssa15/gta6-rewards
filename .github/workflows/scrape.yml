name: Auto-Scrape Gaming News

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      - name: Scrape articles
        run: node scripts/scrape.mjs

      - name: Commit and push changes
        run: |
          git config user.name "gta6-rewards-bot"
          git config user.email "bot@gta6rewards.com"
          git add public/data/articles-*.json
          if git diff --cached --quiet; then
            echo "No new articles to commit"
          else
            git commit -m "chore: auto-scrape new articles from RSS feeds"
            git push
          fi
