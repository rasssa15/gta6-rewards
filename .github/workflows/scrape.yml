name: Auto-Scrape Gaming News

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Scrape articles
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/scrape.mjs

      - name: Commit and push changes
        run: |
          git config user.name "gta6-rewards-bot"
          git config user.email "bot@gta6rewards.com"
          git add public/data/articles-*.json public/images/articles/
          if git diff --cached --quiet; then
            echo "No new articles to commit"
          else
            git commit -m "chore: auto-scrape new articles from RSS feeds"
            git push
          fi
